name: ci

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # Required for tsc to type-check files that import @prisma/client.
        run: pnpm --filter @rakkyo/api exec prisma generate

      - name: Tests
        # Runs every workspace's `test` script via turbo. The api app
        # uses jest with the in-memory repository implementation, so
        # no real Postgres is required at this phase.
        run: pnpm -w turbo run test

      - name: TypeScript — apps/api
        run: pnpm --filter @rakkyo/api exec tsc --noEmit

      - name: TypeScript — apps/web
        # Web app has its own build pipeline; skip if not present.
        run: |
          if [ -f apps/web/tsconfig.json ]; then
            pnpm --filter web exec tsc --noEmit
          else
            echo "no apps/web tsconfig — skipping"
          fi

      - name: Ensure PyYAML is available for the anti-pattern scan
        # Used by .github/scripts/check-antipatterns.sh to parse
        # .completion-gate.yml robustly (handles escaped quotes etc.).
        run: python3 -m pip install --user --quiet pyyaml

      - name: Anti-pattern scan (advisory)
        # Phase 1: report only — does NOT fail the build. Flip to
        # blocking once the existing Rakkyo offenders (Math.random /
        # .substr / unbounded z.string / bare console.log) are cleaned.
        continue-on-error: true
        run: bash .github/scripts/check-antipatterns.sh
